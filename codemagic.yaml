workflows:
  ios-release:
    name: Build iOS (IPA) for Lakhsly
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      vars:
        # ⚠️ لن نضع الرابط هنا، بل سنقرأه من متغيرات البيئة الآمنة في Codemagic
        # (ستضبطه يدوياً في واجهة Codemagic)
        API_BASE_URL: "https://dummy.ngrok-free.app"
    scripts:
      - name: تنظيف المشروع
        script: flutter clean
      - name: تحميل الحزم
        script: flutter pub get
      - name: بناء التطبيق (IPA)
        script: |
          # نقوم بتمرير الرابط العام إلى الكود أثناء البناء
          flutter build ipa --release \
            --dart-define=API_BASE_URL=$API_BASE_URL \
            --obfuscate \
            --split-debug-info=build/debug-info
    artifacts:
      # تحديد مكان ملف الـ IPA الناتج
      - build/ios/ipa/*.ipa
    publishing:
      # إشعار عبر البريد الإلكتروني بنتيجة البناء
      email:
        recipients:
          - abdelrahmansoliman101@gmail.com  # ⚠️ غيّر هذا إلى بريدك الإلكتروني