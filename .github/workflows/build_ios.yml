name: Build iOS IPA (Unsigned)

# يتم تشغيل هذا السكريبت تلقائياً بمجرد عمل Push للكود على فرع main أو master
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من موقع جيت هاب

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest # استخدام سيرفر ماك سحابي من جيت هاب

    steps:
      # 1. سحب كود المشروع من مستودعك
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. تثبيت جافا (مطلوبة لبعض أدوات بناء فلاتر)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. تثبيت بيئة عمل Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # يمكنك تحديد إصدار معين من فلاتر هنا إذا أردت، أو سيقوم بتثبيت أحدث إصدار مستقر تلقائياً

      # 4. تحميل مكاتب وحزم المشروع (Packages)
      - name: Install dependencies
        run: flutter pub get

      # 5. بناء تطبيق الـ iOS بدون توقيع رقمي (لأنه لا يمتلك حساب مطور حالياً)
      - name: Build iOS IPA (Unsigned)
        run: |
          flutter build ipa --no-codesign

      # 6. ضغط وتجهيز الملف الناتج بصيغة .zip ليكون جاهزاً للتحميل
      - name: Upload iOS IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: build/ios/archive/Runner.xcarchive
          retention-days: 7 # سيبقى الملف متاحاً للتحميل لمدة 7 أيام